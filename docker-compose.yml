services:
  postgres:
    image: postgres:18-alpine
    container_name: template-sass-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: template_dev
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ recommends mounting at /var/lib/postgresql so PGDATA
      # lives in a major-version-specific subdir (supports pg_upgrade --link).
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local email catcher. SMTP on :1025 (no auth), web UI on :8025.
  # The mailer package's SMTP transport targets this by default —
  # see packages/mailer/src/env.ts (MAIL_SMTP_HOST/MAIL_SMTP_PORT).
  mailpit:
    image: axllent/mailpit:latest
    container_name: template-sass-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres-data:
