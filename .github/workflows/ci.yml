name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      # Postgres for integration tests. The DB name + creds match the defaults
      # in packages/db/src/env.ts so test code only needs to override DB_NAME.
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: template_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: template_test
      APP_ENV: local
      WEB_BASE_URL: http://localhost:5174
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 11.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations to the test database
        run: pnpm --filter @template-sass/db exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/template_test

      - name: Biome
        run: pnpm exec biome ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 11.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: CDK synth
        run: pnpm --filter @template-sass/cdk synth

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 11.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint commits
        run: pnpm exec commitlint --from origin/${{ github.base_ref }} --to HEAD --verbose

  build-api-image:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build API image
        run: |
          docker build \
            --build-arg GIT_SHA=pr-${{ github.event.pull_request.number }} \
            -f apps/api/Dockerfile \
            -t template-api:pr \
            .

  build-web-app:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 11.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @template-sass/web build
