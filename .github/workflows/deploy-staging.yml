name: deploy-staging

# Manual staging deploy. Trigger from the Actions tab when you want to spin
# staging back up after a tear-down, or push the latest main to it. Does NOT
# auto-fire on push — staging is intentionally pull-based so doc/code merges
# don't unintentionally restart torn-down infra.
#
# Operator discipline: trigger only after the green check on main from ci.yml.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-network-data:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 11.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Deploy network + data stacks
        working-directory: infra/cdk
        run: pnpm exec cdk deploy template-staging-network template-staging-data --require-approval never -c imageTag=${{ github.sha }}

  build-api-image:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-network-data]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
      image-uri: ${{ steps.tag.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2.1.5

      - id: tag
        run: |
          TAG=${{ github.sha }}
          URI=${{ steps.ecr.outputs.registry }}/template-staging-api:$TAG
          echo "image-tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image-uri=$URI" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build \
            --build-arg GIT_SHA=${{ github.sha }} \
            -f apps/api/Dockerfile \
            -t ${{ steps.tag.outputs.image-uri }} \
            .
          docker push ${{ steps.tag.outputs.image-uri }}

  build-web-app:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 11.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @template/web build

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: web-app
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  migrate-db:
    if: github.ref == 'refs/heads/main'
    needs: [build-api-image]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Resolve task def + cluster + network from CFN outputs
        id: cfn
        run: |
          set -e
          TASK_DEF=$(aws cloudformation describe-stacks \
            --stack-name template-staging-data \
            --query 'Stacks[0].Outputs[?OutputKey==`MigratorTaskDefArn`].OutputValue' \
            --output text)
          CLUSTER=$(aws cloudformation describe-stacks \
            --stack-name template-staging-data \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiClusterName`].OutputValue' \
            --output text)
          LOG_GROUP=$(aws cloudformation describe-stacks \
            --stack-name template-staging-data \
            --query 'Stacks[0].Outputs[?OutputKey==`MigratorLogGroupName`].OutputValue' \
            --output text)
          SUBNETS=$(aws cloudformation describe-stacks \
            --stack-name template-staging-network \
            --query 'Stacks[0].Outputs[?OutputKey==`PrivateSubnetIds`].OutputValue' \
            --output text)
          SG=$(aws cloudformation describe-stacks \
            --stack-name template-staging-network \
            --query 'Stacks[0].Outputs[?OutputKey==`EcsSecurityGroupId`].OutputValue' \
            --output text)
          {
            echo "task-def=$TASK_DEF"
            echo "cluster=$CLUSTER"
            echo "log-group=$LOG_GROUP"
            echo "subnets=$SUBNETS"
            echo "sg=$SG"
          } >> "$GITHUB_OUTPUT"

      - name: Run migrator task and wait for completion
        env:
          TASK_DEF: ${{ steps.cfn.outputs.task-def }}
          CLUSTER: ${{ steps.cfn.outputs.cluster }}
          LOG_GROUP: ${{ steps.cfn.outputs.log-group }}
          SUBNETS: ${{ steps.cfn.outputs.subnets }}
          SG: ${{ steps.cfn.outputs.sg }}
        run: |
          set -eo pipefail
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Started task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrator task exited with code $EXIT_CODE"
            echo "--- Last 5 minutes of $LOG_GROUP ---"
            aws logs tail "$LOG_GROUP" --since 5m || true
            exit 1
          fi
          echo "Migrator task completed successfully"

  deploy-app-stack:
    if: github.ref == 'refs/heads/main'
    needs: [migrate-db]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.5
        with:
          version: 11.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Deploy app stack
        working-directory: infra/cdk
        run: |
          pnpm exec cdk deploy template-staging-app \
            --exclusively \
            --require-approval never \
            -c imageTag=${{ github.sha }}

  deploy-web-spa:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-app-stack, build-web-app]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: actions/download-artifact@v8.0.1
        with:
          name: web-app
          path: apps/web/dist

      - name: Resolve SPA bucket + CloudFront distribution from CFN outputs
        id: spa
        run: |
          set -e
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name template-staging-app \
            --query 'Stacks[0].Outputs[?OutputKey==`WebSpaBucketName`].OutputValue' \
            --output text)
          DIST=$(aws cloudformation describe-stacks \
            --stack-name template-staging-app \
            --query 'Stacks[0].Outputs[?OutputKey==`WebSpaDistributionId`].OutputValue' \
            --output text)
          {
            echo "bucket=$BUCKET"
            echo "distribution=$DIST"
          } >> "$GITHUB_OUTPUT"

      - name: Sync SPA bundle to S3
        env:
          BUCKET: ${{ steps.spa.outputs.bucket }}
        # Two-pass sync: hashed Vite assets get long cache + immutable; index.html
        # gets no-cache so SPA shell updates ship on next request after deploy.
        run: |
          aws s3 sync apps/web/dist/ "s3://${BUCKET}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 cp apps/web/dist/index.html "s3://${BUCKET}/index.html" \
            --cache-control "no-cache, must-revalidate"

      - name: Invalidate CloudFront cache for index.html
        env:
          DIST: ${{ steps.spa.outputs.distribution }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DIST" \
            --paths "/" "/index.html"

  smoke:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-app-stack, deploy-web-spa]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - id: outputs
        name: Resolve ALB DNS + CloudFront URL from CFN outputs
        run: |
          set -e
          DNS=$(aws cloudformation describe-stacks \
            --stack-name template-staging-app \
            --query 'Stacks[0].Outputs[?OutputKey==`AlbDnsName`].OutputValue' \
            --output text)
          WEB_URL=$(aws cloudformation describe-stacks \
            --stack-name template-staging-app \
            --query 'Stacks[0].Outputs[?OutputKey==`WebSpaUrl`].OutputValue' \
            --output text)
          if [ -z "$DNS" ] || [ -z "$WEB_URL" ]; then
            echo "Required outputs not found on template-staging-app (got dns='$DNS', web='$WEB_URL')"
            exit 1
          fi
          {
            echo "dns=$DNS"
            echo "web-url=$WEB_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Curl /health and verify version matches the deployed sha
        env:
          ALB_DNS: ${{ steps.outputs.outputs.dns }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -u
          for i in $(seq 1 30); do
            if RESPONSE=$(curl -fsS --max-time 5 "http://$ALB_DNS/health"); then
              echo "attempt $i: $RESPONSE"
              if echo "$RESPONSE" | jq -e --arg sha "$EXPECTED_SHA" '.status == "ok" and .version == $sha' > /dev/null; then
                echo "API smoke test passed"
                break
              fi
              echo "version mismatch — rolling update may still be in progress"
            else
              echo "attempt $i: /health not yet responding"
            fi
            sleep 10
            if [ "$i" = "30" ]; then
              echo "API smoke test failed after 30 attempts (5 minutes)"
              exit 1
            fi
          done

      - name: Curl CloudFront and verify the SPA shell is served
        env:
          WEB_URL: ${{ steps.outputs.outputs.web-url }}
        run: |
          set -u
          for i in $(seq 1 12); do
            if BODY=$(curl -fsS --max-time 10 "$WEB_URL/"); then
              if echo "$BODY" | grep -q 'id="root"'; then
                echo "web SPA smoke test passed ($WEB_URL)"
                break
              fi
              echo "web attempt $i: response did not contain id=\"root\""
            else
              echo "web attempt $i: $WEB_URL not yet responding"
            fi
            sleep 10
            if [ "$i" = "12" ]; then
              echo "web SPA smoke test failed after 12 attempts (2 minutes)"
              exit 1
            fi
          done
